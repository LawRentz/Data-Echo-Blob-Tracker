<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Interactive Motion Echo — Data Echo (Smooth)</title>

<style>
  html,body{
    margin:0;
    height:100%;
    background:#000;
    overflow:hidden;
  }

  canvas{
    display:block;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
</head>

<body>

<script>

let cam, prevFrame, diffImg, motionLayer, haloLayer;

let threshold = 20;

let blobs = [];

let prevPos = new Map();

function setup(){

  createCanvas(windowWidth, windowHeight);

  pixelDensity(1);

  frameRate(60);

  colorMode(HSB, 360, 100, 100, 100);

  // MAIN / REAR CAMERA ONLY
  cam = createCapture({
    video: {
      facingMode: {
        ideal: "environment"
      }
    },
    audio: false
  });

  cam.size(160,120);

  cam.hide();

  prevFrame   = createImage(cam.width, cam.height);

  diffImg     = createImage(cam.width, cam.height);

  motionLayer = createGraphics(width, height);

  haloLayer   = createGraphics(width, height);

  [motionLayer, haloLayer].forEach(l => {

    l.colorMode(HSB, 360, 100, 100, 100);

    l.clear();
  });

  textFont('monospace', 22);

  textStyle(BOLD);
}

function draw(){

  background(0);

  blobs = [];

  cam.loadPixels();

  prevFrame.loadPixels();

  if(cam.pixels.length > 0 && prevFrame.pixels.length > 0){

    diffImg.loadPixels();

    for(let i = 0; i < cam.pixels.length; i += 4){

      let d = dist(

        cam.pixels[i],
        cam.pixels[i+1],
        cam.pixels[i+2],

        prevFrame.pixels[i],
        prevFrame.pixels[i+1],
        prevFrame.pixels[i+2]
      );

      let v = d > threshold ? 255 : 0;

      diffImg.pixels[i]   = v;
      diffImg.pixels[i+1] = v;
      diffImg.pixels[i+2] = v;
      diffImg.pixels[i+3] = 255;
    }

    diffImg.updatePixels();

    motionLayer.fill(0,0,0,16);

    motionLayer.noStroke();

    motionLayer.rect(0,0,width,height);

    motionLayer.push();

    motionLayer.translate(width,0);

    motionLayer.scale(-1,1);

    motionLayer.image(diffImg,0,0,width,height);

    motionLayer.pop();

    blobs = findBlobs(diffImg, cam.width, cam.height);

    haloLayer.clear();

    let t = millis()/1000;

    let pulse = (sin(t * 1.2) + 1) / 2;

    for(let b of blobs){

      let cx = map(
        (b.minX + b.maxX)/2,
        0,
        cam.width,
        width,
        0
      );

      let cy = map(
        (b.minY + b.maxY)/2,
        0,
        cam.height,
        0,
        height
      );

      let key = `${int(cx)}:${int(cy)}`;

      let prev =
        prevPos.get(key) ||
        createVector(cx,cy);

      let sp = dist(prev.x, prev.y, cx, cy);

      prevPos.set(key, createVector(cx,cy));

      let hueVal =
        (200 + sin(t * 0.4 + b.minX * 0.08) * 50) % 360;

      let size = map(
        b.count,
        200,
        3000,
        150,
        280
      );

      drawHalo(
        haloLayer,
        cx,
        cy,
        size,
        hueVal,
        pulse,
        sp
      );
    }

    push();

    tint(255,210);

    image(motionLayer,0,0);

    blendMode(ADD);

    image(haloLayer,0,0);

    blendMode(BLEND);

    pop();

    drawTrackers();

    prevFrame.copy(
      cam,
      0,
      0,
      cam.width,
      cam.height,
      0,
      0,
      cam.width,
      cam.height
    );
  }
}

function drawHalo(layer, x, y, r, hueVal, pulse, spd){

  layer.push();

  layer.translate(x,y);

  layer.noFill();

  for(let i = 0; i < 3; i++){

    let alpha = map(i,0,2,65,18);

    layer.stroke(
      hueVal,
      80,
      100,
      alpha
    );

    layer.strokeWeight(
      map(i,0,2,18,5)
    );

    layer.beginShape();

    for(let a = 0; a < TWO_PI; a += PI/70){

      let sx =
        cos(a) *
        r *
        (1 + 0.018 * pulse);

      let sy =
        sin(a) *
        r *
        (1 + 0.018 * pulse);

      layer.vertex(sx,sy);
    }

    layer.endShape(CLOSE);

    r *= 0.87;
  }

  layer.pop();
}

function drawTrackers(){

  for(let b of blobs){

    let cx = map(
      (b.minX + b.maxX)/2,
      0,
      cam.width,
      width,
      0
    );

    let cy = map(
      (b.minY + b.maxY)/2,
      0,
      cam.height,
      0,
      height
    );

    let side = map(
      b.count,
      200,
      3000,
      120,
      250
    );

    let half = side/2;

    stroke(0,0,100);

    strokeWeight(3);

    noFill();

    rect(
      cx-half,
      cy-half,
      side,
      side,
      10
    );

    fill(0,0,100);

    noStroke();

    textAlign(CENTER);

    textSize(20);

    text(
      `(${int(cx)},${int(cy)})`,
      cx,
      cy - side/2 - 15
    );
  }
}

function findBlobs(img, w, h){

  let visited = new Uint8Array(w * h);

  img.loadPixels();

  let found = [];

  for(let y = 0; y < h; y++){

    for(let x = 0; x < w; x++){

      let idx = x + y * w;

      let p = img.pixels[idx * 4];

      if(p > 128 && !visited[idx]){

        let b = flood(
          x,
          y,
          visited,
          img,
          w,
          h
        );

        if(b.count > 200){
          found.push(b);
        }
      }
    }
  }

  return found;
}

function flood(x, y, vis, img, w, h){

  let st = [[x,y]];

  let minX = x;
  let maxX = x;

  let minY = y;
  let maxY = y;

  let c = 0;

  while(st.length){

    let [cx,cy] = st.pop();

    if(
      cx < 0 ||
      cy < 0 ||
      cx >= w ||
      cy >= h
    ) continue;

    let idx = cx + cy * w;

    if(vis[idx]) continue;

    let p = idx * 4;

    if(img.pixels[p] <= 128) continue;

    vis[idx] = 1;

    c++;

    minX = min(minX,cx);

    maxX = max(maxX,cx);

    minY = min(minY,cy);

    maxY = max(maxY,cy);

    st.push(
      [cx+1,cy],
      [cx-1,cy],
      [cx,cy+1],
      [cx,cy-1]
    );
  }

  return {
    minX,
    maxX,
    minY,
    maxY,
    count:c
  };
}

function windowResized(){

  resizeCanvas(windowWidth, windowHeight);

  motionLayer = createGraphics(width, height);

  haloLayer   = createGraphics(width, height);

  [motionLayer, haloLayer].forEach(l => {

    l.colorMode(
      HSB,
      360,
      100,
      100,
      100
    );

    l.clear();
  });
}

</script>

</body>
</html>
